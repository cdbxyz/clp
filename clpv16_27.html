function responsiveMedia(desk,mob,type,alt){
  var m=mob||'',d=desk||'';var hasMob=m&&m!==d;
  if(!d&&!m)return'<div style="width:100%;height:100%;background:#1a4a5a"></div>';
  if(type==='video'){

    return'<video autoplay muted loop playsinline><source src="'+esc(d||m)+'" type="video/mp4"></video>';
  }
  if(hasMob)return'<picture><source media="(max-width:768px)" srcset="'+esc(m)+'"><img src="'+esc(d)+'" alt="'+esc(alt||'')+'" loading="lazy"></picture>';
  return'<img src="'+esc(d||m)+'" alt="'+esc(alt||'')+'" loading="lazy">';
}

function getGoogleFontsUrl(headingFont,bodyFont){
  var fonts=[];var seen={};
  [headingFont,bodyFont].forEach(function(fv){
    var all=FONT_OPTIONS.heading.concat(FONT_OPTIONS.body);
    var match=all.find(function(o){return o.value===fv;});
    if(match&&!seen[match.gf]){fonts.push(match.gf);seen[match.gf]=true;}
  });
  return'https://fonts.googleapis.com/css2?'+fonts.map(function(f){return'family='+f;}).join('&')+'&display=swap';
}
